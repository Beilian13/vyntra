<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vyntra Chat</title>
<style>
body { font-family:"Segoe UI",sans-serif; margin:0; height:100vh; display:flex; flex-direction:column; background:#1e1e2f; color:#fff; }
header { background:#27293d; padding:10px 20px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; }
header h2 { margin:0; }
header input, header button, header select { margin:2px; padding:5px 8px; border-radius:4px; border:none; }
main { flex:1; display:flex; overflow:hidden; }
#chat-container { flex:3; display:flex; flex-direction:column; padding:10px; overflow-y:auto; background:#1e1e2f; }
#users-container { flex:1; background:#2b2b42; padding:10px; overflow-y:auto; }
#chat { list-style:none; padding:0; margin:0; }
#chat li { margin-bottom:8px; max-width:70%; padding:6px 10px; border-radius:8px; word-wrap:break-word; position:relative; }
.chat-msg { background:#3a3a5a; }
.chat-user { font-weight:bold; color:#ffd700; margin-right:5px; }
.system-msg { color:#aaa; font-style:italic; }
.emoji-btn { cursor:pointer; margin-left:5px; font-size:0.9em; }
footer { display:flex; padding:10px; background:#27293d; flex-wrap:wrap; }
footer input, footer button { padding:8px; margin:2px; border-radius:4px; border:none; }
footer input { flex:1; min-width:150px; }
footer button { background:#5c6bc0; color:#fff; cursor:pointer; }
footer button:hover { background:#7986cb; }
@media(max-width:700px){ main{flex-direction:column;} #users-container{flex:unset;height:120px;} }
</style>
</head>
<body>

<header>
  <h2>Vyntra Chat</h2>
  <div>
    <input id="name" placeholder="Username">
    <button onclick="setName()">Set</button>

    <select id="room"></select>
    <button onclick="join()">Join</button>
  </div>
</header>

<main>
  <div id="chat-container">
    <ul id="chat"></ul>
  </div>
  <div id="users-container">
    <h4>Users in Room</h4>
    <ul id="users"></ul>
  </div>
</main>

<footer>
  <input id="msg" placeholder="Type your message..." onkeypress="if(event.key==='Enter'){send()}">
  <button onclick="send()">Send</button>
</footer>

<script>
let ws
let connected = false
let currentRoom = null
let rooms = new Set()

function connect() {
  const protocol = location.protocol === "https:" ? "wss://" : "ws://"
  ws = new WebSocket(protocol + location.host)

  ws.onopen = () => {
    connected = true
    console.log("Connected to Vyntra")
  }

  ws.onmessage = ({ data }) => {
    const parsed = JSON.parse(data)

    if(parsed.type === "rooms"){
      rooms = new Set(parsed.rooms)
      populateRoomList()
    }
    else if(parsed.type === "users" && parsed.room === currentRoom){
      const usersList = document.getElementById("users")
      usersList.innerHTML = ""
      parsed.users.forEach(u => {
        const li = document.createElement("li")
        li.textContent = u
        usersList.appendChild(li)
      })
    }
    else if(parsed.type === "system"){
      appendMessage(parsed.text, "system-msg")
    }
    else if(parsed.type === "chat"){
      appendMessage(`[${parsed.room}] ${parsed.user}: ${parsed.text}`, "chat-msg", parsed)
    }
  }
}

connect()

function setName(){
  if(!connected) return
  const name = document.getElementById("name").value.trim()
  if(!name) return
  ws.send(JSON.stringify({ type:"setname", name }))
}

function populateRoomList(){
  const sel = document.getElementById("room")
  sel.innerHTML = ""
  rooms.forEach(r => {
    const opt = document.createElement("option")
    opt.value = r
    opt.textContent = r
    sel.appendChild(opt)
  })
}

function join(){
  if(!connected) return
  const room = document.getElementById("room").value
  if(!room) return
  currentRoom = room
  document.getElementById("chat").innerHTML = ""
  ws.send(JSON.stringify({ type:"join", room }))
}

function send(){
  if(!connected || !currentRoom) return
  const input = document.getElementById("msg")
  const text = input.value.trim()
  if(!text) return
  ws.send(JSON.stringify({ type:"message", text }))
  input.value = ""
}

function appendMessage(text, cls, data=null){
    let msgEl = document.getElementById("msg-" + (data?.id || ""))
    
    if(msgEl && data){ 
        // Message already exists: update reactions
        const reactionsDiv = msgEl.querySelector(".reactions")
        reactionsDiv.innerHTML = ""
        for(const e in data.reactions){
            const span = document.createElement("span")
            span.textContent = `${e} ${data.reactions[e].length}`
            span.className = "emoji-btn"
            span.onclick = ()=> react(data.id, e)
            reactionsDiv.appendChild(span)
        }
        return
    }

    // New message
    const li = document.createElement("li")
    li.id = data?.id ? "msg-" + data.id : ""
    li.className = cls
    
    const msgText = document.createElement("div")
    msgText.textContent = text
    li.appendChild(msgText)

    if(data && data.type==="chat"){
    const reactionsDiv = document.createElement("div")
    reactionsDiv.className = "reactions"

    // Use quickEmojis array or default 3 emojis
    const quickEmojis = data.quickEmojis || ["👍","❤️","😂"]

    quickEmojis.forEach(e=>{
        const span = document.createElement("span")
        span.textContent = e + (data.reactions[e]? ` ${data.reactions[e].length}`:"")
        span.className = "emoji-btn"
        span.onclick = ()=> react(data.id, e)
        reactionsDiv.appendChild(span)
    })

    // Custom emoji picker button
    const customBtn = document.createElement("button")
    customBtn.textContent = "✦"
    customBtn.onclick = ()=> openEmojiPicker(data.id)
    customBtn.style.marginLeft = "5px"
    reactionsDiv.appendChild(customBtn)

    li.appendChild(reactionsDiv)
}

    document.getElementById("chat").appendChild(li)
    li.scrollIntoView({behavior:"smooth"})
}

function react(messageId, emoji){
  if(!connected || !currentRoom) return
  ws.send(JSON.stringify({ type:"reaction", messageId, emoji }))
}

  let currentPickerMessage = null
let allEmojis = []

// Load all emojis from JSON (hosted)
fetch("https://unpkg.com/emoji.json/emoji.json")
  .then(res => res.json())
  .then(data => {
      allEmojis = data.map(e => e.char).filter(Boolean)
  })

function openEmojiPicker(messageId){
    currentPickerMessage = messageId
    const grid = document.getElementById("emoji-grid")
    grid.innerHTML = ""

    allEmojis.forEach(e=>{
        const btn = document.createElement("button")
        btn.textContent = e
        btn.style.fontSize = "24px"
        btn.style.border = "none"
        btn.style.background = "none"
        btn.style.cursor = "pointer"
        btn.onclick = ()=>{
            react(messageId, e)

            // Replace quick emojis with selected custom emoji
            const msgEl = document.getElementById("msg-" + messageId)
            if(msgEl){
                const reactionsDiv = msgEl.querySelector(".reactions")
                // Remove all starter quick emojis
                reactionsDiv.querySelectorAll(".emoji-btn").forEach(span=>{
                    if(span.textContent[0] !== e){ span.remove() }
                })
                // Add picked emoji if not already present
                if(!Array.from(reactionsDiv.children).some(c=>c.textContent[0]===e)){
                    const span = document.createElement("span")
                    span.textContent = e
                    span.className = "emoji-btn"
                    span.onclick = ()=> react(messageId, e)
                    reactionsDiv.insertBefore(span, reactionsDiv.lastChild) // before ✦ button
                }
            }

            closeEmojiPicker()
        }
        grid.appendChild(btn)
    })

    document.getElementById("emoji-picker-overlay").style.display = "flex"
}

function closeEmojiPicker(){
    document.getElementById("emoji-picker-overlay").style.display = "none"
    currentPickerMessage = null
}

document.getElementById("emoji-search").addEventListener("input",(e)=>{
    const val = e.target.value
    const buttons = document.getElementById("emoji-grid").querySelectorAll("button")
    buttons.forEach(b=>{
        b.style.display = b.textContent.includes(val) ? "" : "none"
    })
})
</script>

<!-- Circular Emoji Picker -->
<div id="emoji-picker-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.3);z-index:1000;justify-content:center;align-items:center;">
  <div id="emoji-picker" style="position:relative;width:400px;height:400px;border-radius:50%;background:#fff;display:flex;flex-wrap:wrap;align-content:center;justify-content:center;overflow-y:auto;padding:20px;box-shadow:0 0 20px rgba(0,0,0,0.5);">
    <button onclick="closeEmojiPicker()" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:none;background:#f00;color:#fff;font-size:24px;border-radius:50%;width:50px;height:50px;cursor:pointer;">✕</button>
  </div>
</div>
  
</body>
</html>
