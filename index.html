<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Vyntra — Chat</title>
<style>
:root{
  --bg:#0f1220;--panel:#161827;--muted:#9aa0b4;--accent:#6c7cff;
  --bubble:#20233a;--system:#8b8f9f;--white:#eef2ff;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0;font-family:Inter,Segoe UI,system-ui,Arial;background:var(--bg);color:var(--white);-webkit-font-smoothing:antialiased}

/* ── Auth ── */
#authScreen{display:flex;align-items:center;justify-content:center;height:100%;background:radial-gradient(ellipse at 50% 40%,#1a1c35,var(--bg))}
.auth-box{width:min(420px,92vw);background:#13152a;border-radius:16px;padding:36px 32px;box-shadow:0 20px 60px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.04)}
.auth-box h2{margin:0 0 6px;font-size:22px}
.auth-box p{margin:0 0 24px;color:var(--muted);font-size:14px}
.auth-tabs{display:flex;margin-bottom:24px;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,0.06)}
.auth-tab{flex:1;padding:9px;text-align:center;cursor:pointer;font-size:14px;color:var(--muted);background:transparent;border:none;transition:background 0.15s}
.auth-tab.active{background:var(--accent);color:#fff}
.auth-field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.auth-field label{font-size:13px;color:var(--muted)}
.auth-field input{padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:#0b0d16;color:var(--white);font-size:14px;outline:none;transition:border-color 0.15s;width:100%}
.auth-field input:focus{border-color:var(--accent)}
.auth-submit{width:100%;padding:11px;border-radius:8px;background:var(--accent);color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;transition:opacity 0.15s}
.auth-submit:hover{opacity:0.88}
.auth-submit:disabled{opacity:0.5;cursor:not-allowed}
.auth-error{color:#ff6b6b;font-size:13px;margin-top:10px;min-height:18px;text-align:center}
.auth-note{color:var(--muted);font-size:13px;margin-top:10px;text-align:center}
.code-inputs{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.code-inputs input{width:44px;height:52px;text-align:center;font-size:22px;font-weight:700;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:#0b0d16;color:var(--white);outline:none;transition:border-color 0.15s}
.code-inputs input:focus{border-color:var(--accent)}
.back-btn{background:transparent;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:0;margin-top:12px;display:block;width:100%;text-align:center}
.back-btn:hover{color:var(--white)}

/* ── App ── */
#appShell{display:none;flex-direction:column;height:100%}
header{height:64px;background:linear-gradient(90deg,#11121b,#15172b);display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid rgba(255,255,255,0.03);position:relative;z-index:100}
.header-left{display:flex;gap:12px;align-items:center}
h1{font-size:16px;margin:0;font-weight:600;color:var(--white)}
.controls{display:flex;gap:8px;align-items:center}
input,select,button{font-size:14px}
button{background:var(--accent);color:white;border:0;padding:8px 10px;border-radius:8px;cursor:pointer}
button.ghost{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--white)}
main{display:flex;flex:1;overflow:hidden;height:calc(100% - 64px)}
.sideRooms{width:220px;background:#0d0f1a;border-right:1px solid rgba(255,255,255,0.02);padding:12px;overflow:auto}
.room{padding:8px 10px;border-radius:8px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;gap:8px}
.room.active{background:linear-gradient(90deg,#1b1d33,#151629);box-shadow:inset 0 0 0 1px rgba(108,124,255,0.06)}
.room .emoji{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;background:#0f111a;font-size:12px;font-weight:700;color:var(--muted)}
.room h4{margin:0;font-size:13px}
.chatArea{flex:1;display:flex;flex-direction:column;min-width:0}
.roomHeader{padding:12px;border-bottom:1px solid rgba(255,255,255,0.03);display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,rgba(0,0,0,0.04),transparent)}
.roomHeader .meta{color:var(--muted);font-size:13px}
.messages{flex:1;overflow:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:80%;padding:10px 12px;border-radius:10px;background:var(--bubble);word-break:break-word;align-self:flex-start}
.msg.me{background:linear-gradient(90deg,#5f6bff,#7d86ff);color:white;align-self:flex-end}
.msg .meta{font-size:12px;color:var(--muted);margin-bottom:6px}
.msg.me .meta{color:rgba(255,255,255,0.6)}
.msg .text{font-size:14px;line-height:1.4}
.msg .reactions{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.reaction{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:999px;background:rgba(255,255,255,0.03);font-size:13px;cursor:pointer;border:1px solid transparent}
.reaction.you{border-color:rgba(108,124,255,0.3);background:rgba(108,124,255,0.08)}
.system{font-style:italic;color:var(--system);font-size:13px;text-align:center;padding:6px}
.compose{display:flex;padding:12px;border-top:1px solid rgba(255,255,255,0.03);gap:8px;background:#0e1020}
input.msg-input{flex:1;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.03);background:#0b0d16;color:var(--white);outline:none}
input.msg-input:focus{border-color:rgba(108,124,255,0.3)}
.icon-btn{width:44px;height:44px;border-radius:50%;background:#0b0d16;border:1px solid rgba(255,255,255,0.02);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--white);flex-shrink:0}
.small{font-size:12px;padding:6px 10px}
.usersPanel{width:220px;border-left:1px solid rgba(255,255,255,0.02);background:#0b0e18;padding:12px;overflow:auto}
.usersPanel h4{margin:0 0 8px;color:var(--muted);font-size:13px}
.user{padding:6px 8px;border-radius:6px;margin-bottom:4px;color:var(--white);display:flex;align-items:center}
.pulse{width:8px;height:8px;border-radius:50%;background:#39d353;margin-right:8px;flex-shrink:0}
.center-note{display:flex;align-items:center;justify-content:center;color:var(--muted);height:100%}

/* ── Emoji picker ── */
#emoji-picker-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1200;align-items:center;justify-content:center}
#emoji-picker{width:min(640px,92vw);height:min(480px,70vh);border-radius:16px;background:linear-gradient(180deg,#fff,#f4f6ff);position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.5);display:flex;flex-direction:column;align-items:center;padding:18px}
#emoji-grid{flex:1;width:100%;display:grid;grid-template-columns:repeat(auto-fill,44px);gap:8px;align-content:start;overflow:auto;padding:12px;border-radius:12px}
#emoji-close{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:62px;height:62px;border-radius:50%;background:#ff4d4f;color:#fff;border:none;font-size:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(0,0,0,0.2);cursor:pointer}

/* ── Mobile ── */
#mobileRoomsBtn{display:none;position:relative;z-index:101;flex-shrink:0;margin-right:4px}
#mobileRoomsPanel{position:fixed;top:64px;left:0;width:220px;max-width:70vw;height:calc(100% - 64px);background:#0d0f1a;border-right:1px solid rgba(255,255,255,0.02);overflow:auto;padding:12px;z-index:999;box-shadow:4px 0 16px rgba(0,0,0,0.4);transform:translateX(-100%);transition:transform 0.25s ease}
#mobileRoomsPanel.show{transform:translateX(0)}
#mobileRoomsOverlay{display:none;position:fixed;inset:0;top:64px;z-index:998;background:rgba(0,0,0,0.35)}
#mobileRoomsOverlay.show{display:block}
@media(max-width:900px){
  #mobileRoomsBtn{display:flex}
  .sideRooms{display:none}
  .usersPanel{display:none}
  .roomHeader .meta{display:none}
}
</style>
</head>
<body>

<!-- ── Auth Screen ── -->
<div id="authScreen">
  <div class="auth-box">
    <h2>Vyntra</h2>
    <p>Chat with your friends</p>

    <!-- Step 1: Login / Register tabs -->
    <div id="stepTabs">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Login</button>
        <button class="auth-tab"        onclick="switchTab('register')">Register</button>
      </div>

      <!-- Login form -->
      <div id="formLogin">
        <div class="auth-field"><label>Username</label><input id="loginUsername" type="text" placeholder="your username" autocomplete="username" /></div>
        <div class="auth-field"><label>Password</label><input id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password" /></div>
        <button class="auth-submit" id="loginBtn" onclick="doLogin()">Login</button>
      </div>

      <!-- Register form -->
      <div id="formReg" style="display:none">
        <div class="auth-field"><label>Username</label><input id="regUsername" type="text" placeholder="coolname" autocomplete="username" /></div>
        <div class="auth-field"><label>Email</label><input id="regEmail" type="email" placeholder="you@example.com" autocomplete="email" /></div>
        <div class="auth-field"><label>Password</label><input id="regPass" type="password" placeholder="••••••••" autocomplete="new-password" /></div>
        <button class="auth-submit" id="registerBtn" onclick="doRegister()">Create account</button>
      </div>
    </div>

    <!-- Step 2: 2FA code entry (hidden until login step 1 succeeds) -->
    <div id="step2FA" style="display:none">
      <p style="color:var(--muted);font-size:14px;margin:0 0 20px">We sent a 6-digit code to your email. Enter it below:</p>
      <div class="code-inputs">
        <input class="code-digit" maxlength="1" inputmode="numeric" />
        <input class="code-digit" maxlength="1" inputmode="numeric" />
        <input class="code-digit" maxlength="1" inputmode="numeric" />
        <input class="code-digit" maxlength="1" inputmode="numeric" />
        <input class="code-digit" maxlength="1" inputmode="numeric" />
        <input class="code-digit" maxlength="1" inputmode="numeric" />
      </div>
      <button class="auth-submit" id="verifyBtn" onclick="doVerify()">Verify</button>
      <button class="back-btn" onclick="cancelVerify()">← Back to login</button>
    </div>

    <div class="auth-error" id="authError"></div>
  </div>
</div>

<!-- ── App Shell ── -->
<div id="appShell">
  <header>
    <div class="header-left">
      <button id="mobileRoomsBtn" class="icon-btn" title="Rooms">☰</button>
      <h1>Vyntra</h1>
      <span id="headerUsername" style="color:var(--muted);font-size:13px"></span>
    </div>
    <div class="controls">
      <button class="ghost small" id="reconnectBtn">Reconnect</button>
      <button class="ghost small" onclick="doLogout()">Logout</button>
    </div>
  </header>

  <div id="mobileRoomsOverlay"></div>
  <div id="mobileRoomsPanel"></div>

  <main>
    <aside class="sideRooms" id="roomsList"></aside>
    <section class="chatArea">
      <div class="roomHeader">
        <div>
          <div id="roomTitle" style="font-weight:600">Select a room</div>
          <div class="meta" id="roomMeta">Join a room to start chatting</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <div id="roomUsersCount" class="meta">0 users</div>
        </div>
      </div>
      <div class="messages" id="messages">
        <div class="center-note">Join a room to see messages</div>
      </div>
      <div class="compose">
        <button id="openPickerBtn" class="icon-btn" title="Open emoji picker">✦</button>
        <input id="msgInput" class="msg-input" type="text" placeholder="Type a message (press Enter to send)" />
        <button id="sendBtn" class="small">Send</button>
      </div>
    </section>
    <aside class="usersPanel">
      <h4>Users in room</h4>
      <div id="usersList"></div>
    </aside>
  </main>
</div>

<!-- Emoji Picker -->
<div id="emoji-picker-overlay">
  <div id="emoji-picker">
    <input id="emoji-search" placeholder="Search emoji..." autocomplete="off" />
    <div id="emoji-grid"></div>
    <button id="emoji-close">✕</button>
  </div>
</div>

<script>
/* ══════════════════════════════════
   AUTH
══════════════════════════════════ */
let pendingUsername = null; // username waiting for 2FA

function switchTab(tab) {
  document.getElementById('formLogin').style.display = tab === 'login'    ? '' : 'none';
  document.getElementById('formReg').style.display   = tab === 'register' ? '' : 'none';
  document.querySelectorAll('.auth-tab').forEach((t, i) =>
    t.classList.toggle('active', i === (tab === 'login' ? 0 : 1))
  );
  setAuthError('');
}

function setAuthError(msg) { document.getElementById('authError').textContent = msg; }

function setBusy(id, busy) {
  const btn = document.getElementById(id);
  btn.disabled = busy;
  btn.textContent = busy ? '...' : { loginBtn:'Login', registerBtn:'Create account', verifyBtn:'Verify' }[id];
}

async function doLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPass').value;
  if (!username || !password) return setAuthError('Please fill in all fields');
  setBusy('loginBtn', true);
  try {
    const res  = await fetch('/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username, password }) });
    const data = await res.json();
    if (!res.ok) { setAuthError(data.error || 'Login failed'); return; }
    // Show 2FA step
    pendingUsername = data.username;
    document.getElementById('stepTabs').style.display = 'none';
    document.getElementById('step2FA').style.display  = '';
    setAuthError('');
    setTimeout(() => document.querySelector('.code-digit').focus(), 80);
  } catch(e) { setAuthError('Network error'); }
  finally { setBusy('loginBtn', false); }
}

async function doRegister() {
  const username = document.getElementById('regUsername').value.trim();
  const email    = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPass').value;
  if (!username || !email || !password) return setAuthError('Please fill in all fields');
  setBusy('registerBtn', true);
  try {
    const res  = await fetch('/auth/register', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username, email, password }) });
    const data = await res.json();
    if (!res.ok) { setAuthError(data.error || 'Registration failed'); return; }
    saveSession(data.token, data.username);
    launchApp(data.token, data.username);
  } catch(e) { setAuthError('Network error'); }
  finally { setBusy('registerBtn', false); }
}

async function doVerify() {
  const code = Array.from(document.querySelectorAll('.code-digit')).map(i => i.value).join('');
  if (code.length < 6) return setAuthError('Enter all 6 digits');
  setBusy('verifyBtn', true);
  try {
    const res  = await fetch('/auth/verify', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username: pendingUsername, code }) });
    const data = await res.json();
    if (!res.ok) { setAuthError(data.error || 'Verification failed'); return; }
    saveSession(data.token, data.username);
    launchApp(data.token, data.username);
  } catch(e) { setAuthError('Network error'); }
  finally { setBusy('verifyBtn', false); }
}

function cancelVerify() {
  pendingUsername = null;
  document.getElementById('step2FA').style.display  = 'none';
  document.getElementById('stepTabs').style.display = '';
  document.querySelectorAll('.code-digit').forEach(i => i.value = '');
  setAuthError('');
}

function saveSession(token, username) {
  localStorage.setItem('vyntra_token',    token);
  localStorage.setItem('vyntra_username', username);
}

function doLogout() {
  localStorage.removeItem('vyntra_token');
  localStorage.removeItem('vyntra_username');
  location.reload();
}

// Auto-login if token saved
(function checkSavedSession() {
  const token    = localStorage.getItem('vyntra_token');
  const username = localStorage.getItem('vyntra_username');
  if (token && username) launchApp(token, username);
})();

// 2FA code digit auto-advance
document.addEventListener('DOMContentLoaded', () => {
  const digits = document.querySelectorAll('.code-digit');
  digits.forEach((input, idx) => {
    input.addEventListener('input', () => {
      input.value = input.value.replace(/\D/g, '').slice(-1);
      if (input.value && idx < digits.length - 1) digits[idx + 1].focus();
      if (idx === digits.length - 1 && input.value) doVerify();
    });
    input.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !input.value && idx > 0) digits[idx - 1].focus();
    });
    input.addEventListener('paste', e => {
      const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'').slice(0,6);
      if (pasted.length === 6) {
        digits.forEach((d, i) => d.value = pasted[i] || '');
        digits[5].focus();
        setTimeout(doVerify, 100);
      }
      e.preventDefault();
    });
  });
});

/* ══════════════════════════════════
   APP LAUNCH
══════════════════════════════════ */
function launchApp(token, username) {
  myName = username;
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appShell').style.display   = 'flex';
  document.getElementById('headerUsername').textContent = '@' + username;
  connectWS(token);
  initAppListeners();
}

/* ══════════════════════════════════
   WEBSOCKET
══════════════════════════════════ */
let ws = null, connected = false, currentRoom = null, myName = "";
const rooms = new Set(), messagesCache = {};

function safeParse(s) { try { return JSON.parse(s); } catch(e) { return null; } }

let _listenersReady = false;
function initAppListeners() {
  if (_listenersReady) return;
  _listenersReady = true;
  document.getElementById('sendBtn').addEventListener('click', sendMessage);
  document.getElementById('msgInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
  document.getElementById('reconnectBtn').addEventListener('click', () => {
    const t = localStorage.getItem('vyntra_token');
    if (t) connectWS(t);
  });
  document.getElementById('openPickerBtn').addEventListener('click', () => openEmojiPicker('__composer'));
  document.getElementById('mobileRoomsBtn').addEventListener('click', () => {
    document.getElementById('mobileRoomsPanel').classList.contains('show') ? closeMobilePanel() : openMobilePanel();
  });
  document.getElementById('mobileRoomsOverlay').addEventListener('click', closeMobilePanel);
  document.getElementById('emoji-close').addEventListener('click', closeEmojiPicker);
  document.getElementById('emoji-search').addEventListener('input', e => populateEmojiGrid(e.target.value.trim()));
  document.getElementById('emoji-picker-overlay').addEventListener('click', ev => {
    if (ev.target === document.getElementById('emoji-picker-overlay')) closeEmojiPicker();
  });
}

function connectWS(token) {
  if (!location.host) return;
  if (ws) { try { ws.close(); } catch(e) {} }
  const protocol = location.protocol === 'https:' ? 'wss://' : 'ws://';
  try { ws = new WebSocket(protocol + location.host); } catch(e) { return; }
  ws.addEventListener('open',    ()  => { connected = true; ws.send(JSON.stringify({ type: 'auth', token })); });
  ws.addEventListener('close',   ()  => { connected = false; setTimeout(() => { const t = localStorage.getItem('vyntra_token'); if (t) connectWS(t); }, 2000); });
  ws.addEventListener('message', ev  => handleWsMsg(ev.data));
  ws.addEventListener('error',   ()  => { connected = false; });
}

function wsSend(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

/* ══════════════════════════════════
   MESSAGE HANDLER
══════════════════════════════════ */
function handleWsMsg(raw) {
  const data = safeParse(raw);
  if (!data) return;
  if      (data.type === 'rooms')   populateRooms(data.rooms || []);
  else if (data.type === 'users' && data.room === currentRoom) populateUsers(data.users || []);
  else if (data.type === 'system')  pushSystemMessage(data.text);
  else if (data.type === 'chat')    cacheAndRenderMessage(data);
  else if (data.type === 'auth_err') doLogout();
}

/* ══════════════════════════════════
   CHAT ACTIONS
══════════════════════════════════ */
function sendMessage() {
  if (!connected)   return alert('Not connected');
  if (!currentRoom) return alert('Join a room first');
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if (!text) return;
  wsSend({ type: 'message', text });
  input.value = '';
}

function reactMessage(messageId, emoji) {
  if (!connected || !currentRoom) return;
  wsSend({ type: 'reaction', messageId, emoji });
}

/* ══════════════════════════════════
   ROOMS
══════════════════════════════════ */
function populateRooms(list) {
  const desktop = document.getElementById('roomsList');
  const mobile  = document.getElementById('mobileRoomsPanel');
  desktop.innerHTML = '';
  mobile.innerHTML  = '';
  list.forEach(r => {
    rooms.add(r);
    [desktop, mobile].forEach(container => {
      const btn = document.createElement('div');
      btn.className    = 'room';
      btn.dataset.room = r;
      btn.innerHTML    = `<div class="emoji">${r.slice(0,2).toUpperCase()}</div><h4>${r}</h4>`;
      btn.addEventListener('click', () => { joinRoom(r); closeMobilePanel(); });
      container.appendChild(btn);
    });
  });
}

function joinRoom(room) {
  if (!connected) return alert('Not connected');
  currentRoom = room;
  document.getElementById('messages').innerHTML = '';
  document.getElementById('roomTitle').textContent      = room;
  document.getElementById('roomMeta').textContent       = 'Loading messages...';
  document.getElementById('roomUsersCount').textContent = '0 users';
  document.querySelectorAll('.room').forEach(r => r.classList.toggle('active', r.dataset.room === room));
  wsSend({ type: 'join', room });
}

/* ══════════════════════════════════
   USERS
══════════════════════════════════ */
function populateUsers(list) {
  const cont = document.getElementById('usersList');
  cont.innerHTML = '';
  (list || []).forEach(u => {
    const div = document.createElement('div');
    div.className = 'user';
    div.innerHTML = `<div class="pulse"></div><div>${u}</div>`;
    cont.appendChild(div);
  });
  document.getElementById('roomUsersCount').textContent = `${list.length} user${list.length !== 1 ? 's' : ''}`;
}

/* ══════════════════════════════════
   MESSAGES
══════════════════════════════════ */
function cacheAndRenderMessage(msg) {
  if (!msg || !msg.room) return;
  if (!messagesCache[msg.room]) messagesCache[msg.room] = [];
  const idx = messagesCache[msg.room].findIndex(m => m.id === msg.id);
  if (idx >= 0) messagesCache[msg.room][idx] = msg;
  else messagesCache[msg.room].push(msg);
  if (msg.room === currentRoom) renderMessage(msg);
}

function pushSystemMessage(text) {
  const el = document.createElement('div');
  el.className = 'system';
  el.textContent = text;
  const msgs = document.getElementById('messages');
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function renderMessage(msg) {
  const container = document.getElementById('messages');
  const existing  = document.getElementById('msg-' + msg.id);
  if (existing) { populateReactions(existing.querySelector('.reactions'), msg); return; }

  const placeholder = container.querySelector('.center-note');
  if (placeholder) placeholder.remove();

  const wrapper = document.createElement('div');
  wrapper.className = 'msg' + (msg.user === myName ? ' me' : '');
  wrapper.id = 'msg-' + msg.id;

  const meta = document.createElement('div');
  meta.className   = 'meta';
  meta.textContent = `${msg.user} • ${new Date(parseInt(String(msg.id).split('_')[0])).toLocaleTimeString()}`;

  const text = document.createElement('div');
  text.className   = 'text';
  text.textContent = msg.text;

  const reactionsDiv = document.createElement('div');
  reactionsDiv.className = 'reactions';
  populateReactions(reactionsDiv, msg);

  wrapper.appendChild(meta);
  wrapper.appendChild(text);
  wrapper.appendChild(reactionsDiv);
  container.appendChild(wrapper);
  container.scrollTop = container.scrollHeight;
}

function populateReactions(reactionsDiv, msg) {
  const voted = msg.reactions ? Object.keys(msg.reactions).filter(k => msg.reactions[k].length > 0) : [];
  reactionsDiv.innerHTML = '';
  voted.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'reaction' + (msg.reactions[e].includes(myName) ? ' you' : '');
    btn.innerHTML = `<span style="font-size:16px">${e}</span><span style="margin-left:4px">${msg.reactions[e].length}</span>`;
    btn.onclick = () => reactMessage(msg.id, e);
    reactionsDiv.appendChild(btn);
  });
  const picker = document.createElement('button');
  picker.className = 'reaction';
  picker.textContent = '✦';
  picker.title = 'Add reaction';
  picker.style.background = 'transparent';
  picker.onclick = () => openEmojiPicker(msg.id);
  reactionsDiv.appendChild(picker);
}

   MOBILE PANEL
══════════════════════════════════ */
function openMobilePanel() {
  document.getElementById('mobileRoomsPanel').classList.add('show');
  document.getElementById('mobileRoomsOverlay').classList.add('show');
}
function closeMobilePanel() {
  document.getElementById('mobileRoomsPanel').classList.remove('show');
  document.getElementById('mobileRoomsOverlay').classList.remove('show');
}

/* ══════════════════════════════════
   EMOJI PICKER
══════════════════════════════════ */
let allEmojis = [], pickerOpenFor = null;
(async function loadEmojiSet() {
  try {
    const res  = await fetch("https://unpkg.com/emoji.json@13.1.0/emoji.json");
    const json = await res.json();
    allEmojis  = json.filter(e => e.char && e.name).map(e => ({ char: e.char, name: e.name }));
  } catch(e) {
    allEmojis = [{ char:"😀",name:"grinning face" },{ char:"😂",name:"tears of joy" },{ char:"❤️",name:"red heart" }];
  }
})();

function openEmojiPicker(msgId) {
  pickerOpenFor = msgId;
  document.getElementById('emoji-picker-overlay').style.display = 'flex';
  populateEmojiGrid('');
  setTimeout(() => document.getElementById('emoji-search').focus(), 80);
}
function closeEmojiPicker() {
  pickerOpenFor = null;
  document.getElementById('emoji-picker-overlay').style.display = 'none';
  document.getElementById('emoji-search').value = '';
}
function populateEmojiGrid(filter) {
  const grid = document.getElementById('emoji-grid');
  grid.innerHTML = '';
  const f = (filter || '').toLowerCase();
  let count = 0;
  for (const { char, name } of allEmojis) {
    if (f && !char.includes(f) && !name.toLowerCase().includes(f)) continue;
    const btn = document.createElement('button');
    btn.textContent = char;
    btn.onclick = () => {
      if (pickerOpenFor === '__composer') { document.getElementById('msgInput').value += char; return; }
      reactMessage(pickerOpenFor, char);
      closeEmojiPicker();
    };
    grid.appendChild(btn);
    if (++count > 3000) break;
  }
}
</script>
