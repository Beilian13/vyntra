<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Vyntra — Chat</title>
<style>
:root{
  --bg:#0f1220;--panel:#161827;--muted:#9aa0b4;--accent:#6c7cff;
  --bubble:#20233a;--system:#8b8f9f;--white:#eef2ff;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0;font-family:Inter,Segoe UI,system-ui,Arial;background:var(--bg);color:var(--white);-webkit-font-smoothing:antialiased}

/* AUTH */
#authScreen{display:flex;align-items:center;justify-content:center;height:100%;background:radial-gradient(ellipse at 50% 40%,#1a1c35,var(--bg))}
.auth-box{width:min(420px,92vw);background:#13152a;border-radius:16px;padding:36px 32px;box-shadow:0 20px 60px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.04)}
.auth-box h2{margin:0 0 6px;font-size:22px}
.auth-box p{margin:0 0 24px;color:var(--muted);font-size:14px}
.auth-tabs{display:flex;margin-bottom:24px;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,0.06)}
.auth-tab{flex:1;padding:9px;text-align:center;cursor:pointer;font-size:14px;color:var(--muted);background:transparent;border:none;transition:background 0.15s}
.auth-tab.active{background:var(--accent);color:#fff}
.auth-field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.auth-field label{font-size:13px;color:var(--muted)}
.auth-field input{padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:#0b0d16;color:var(--white);font-size:14px;outline:none;transition:border-color 0.15s;width:100%}
.auth-field input:focus{border-color:var(--accent)}
.auth-submit{width:100%;padding:11px;border-radius:8px;background:var(--accent);color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;transition:opacity 0.15s}
.auth-submit:hover{opacity:0.88}
.auth-submit:disabled{opacity:0.5;cursor:not-allowed}
.auth-error{color:#ff6b6b;font-size:13px;margin-top:10px;min-height:18px;text-align:center}
.code-inputs{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.code-inputs input{width:44px;height:52px;text-align:center;font-size:22px;font-weight:700;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:#0b0d16;color:var(--white);outline:none;transition:border-color 0.15s}
.code-inputs input:focus{border-color:var(--accent)}
.back-btn{background:transparent;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:0;margin-top:12px;display:block;width:100%;text-align:center}
.back-btn:hover{color:var(--white)}

/* APP */
#appShell{display:none;flex-direction:column;height:100%}
header{height:64px;background:linear-gradient(90deg,#11121b,#15172b);display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid rgba(255,255,255,0.03);position:relative;z-index:100}
.header-left{display:flex;gap:12px;align-items:center}
h1{font-size:16px;margin:0;font-weight:600;color:var(--white)}
button{background:var(--accent);color:white;border:0;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:14px}
button.ghost{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--white)}
main{display:flex;flex:1;overflow:hidden;height:calc(100% - 64px)}

/* SIDEBAR */
.sidebar{width:220px;background:#0d0f1a;border-right:1px solid rgba(255,255,255,0.02);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,0.04);flex-shrink:0}
.sidebar-tab{flex:1;padding:10px;text-align:center;font-size:13px;color:var(--muted);cursor:pointer;background:transparent;border:none;border-bottom:2px solid transparent;transition:all 0.15s}
.sidebar-tab.active{color:var(--white);border-bottom-color:var(--accent)}
.sidebar-panel{flex:1;overflow:auto;padding:12px;display:none}
.sidebar-panel.active{display:block}

/* ROOM ITEMS */
.room{padding:8px 10px;border-radius:8px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;gap:8px}
.room:hover{background:rgba(255,255,255,0.03)}
.room.active{background:linear-gradient(90deg,#1b1d33,#151629);box-shadow:inset 0 0 0 1px rgba(108,124,255,0.06)}
.room .r-icon{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;background:#0f111a;font-size:12px;font-weight:700;color:var(--muted);flex-shrink:0}
.room h4{margin:0;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* FRIENDS */
.friend-item{padding:8px 10px;border-radius:8px;margin-bottom:6px;display:flex;align-items:center;gap:8px;background:#0f111a}
.friend-avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.friend-name{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.friend-actions{display:flex;gap:4px}
.friend-btn{padding:4px 7px;font-size:11px;border-radius:6px;background:#1a1d30;border:1px solid rgba(255,255,255,0.06);color:var(--muted);cursor:pointer}
.friend-btn:hover{color:var(--white);background:#22253a}
.friend-btn.danger:hover{color:#ff6b6b;border-color:rgba(255,107,107,0.3)}
.no-friends{color:var(--muted);font-size:13px;text-align:center;padding:20px 8px;line-height:1.6}

/* CHAT */
.chatArea{flex:1;display:flex;flex-direction:column;min-width:0}
.roomHeader{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.03);display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,rgba(0,0,0,0.04),transparent)}
.roomHeader .meta{color:var(--muted);font-size:13px}
.messages{flex:1;overflow:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:80%;padding:10px 12px;border-radius:10px;background:var(--bubble);word-break:break-word;align-self:flex-start}
.msg.me{background:linear-gradient(90deg,#5f6bff,#7d86ff);color:white;align-self:flex-end}
.msg .meta{font-size:12px;color:var(--muted);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.msg.me .meta{color:rgba(255,255,255,0.6)}
.msg .text{font-size:14px;line-height:1.4}
.msg .reactions{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.reaction{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:999px;background:rgba(255,255,255,0.03);font-size:13px;cursor:pointer;border:1px solid transparent}
.reaction.you{border-color:rgba(108,124,255,0.3);background:rgba(108,124,255,0.08)}
.username-link{cursor:pointer;font-weight:600}
.username-link:hover{text-decoration:underline;opacity:0.8}
.system{font-style:italic;color:var(--system);font-size:13px;text-align:center;padding:6px}
.compose{display:flex;padding:12px;border-top:1px solid rgba(255,255,255,0.03);gap:8px;background:#0e1020}
input.msg-input{flex:1;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.03);background:#0b0d16;color:var(--white);outline:none;font-size:14px}
input.msg-input:focus{border-color:rgba(108,124,255,0.3)}
.icon-btn{width:44px;height:44px;border-radius:50%;background:#0b0d16;border:1px solid rgba(255,255,255,0.02);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--white);flex-shrink:0}
.small{font-size:12px;padding:6px 10px}
.center-note{display:flex;align-items:center;justify-content:center;color:var(--muted);height:100%}

/* USERS PANEL */
.usersPanel{width:190px;border-left:1px solid rgba(255,255,255,0.02);background:#0b0e18;padding:12px;overflow:auto;flex-shrink:0}
.usersPanel h4{margin:0 0 8px;color:var(--muted);font-size:13px}
.user-item{padding:6px 8px;border-radius:6px;margin-bottom:4px;color:var(--white);display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px}
.user-item:hover{background:rgba(255,255,255,0.04)}
.pulse{width:8px;height:8px;border-radius:50%;background:#39d353;flex-shrink:0}

/* USER POPUP */
#popupOverlay{display:none;position:fixed;inset:0;z-index:499}
#userPopup{display:none;position:fixed;z-index:500;background:#13152a;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px;min-width:190px;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
.popup-username{font-weight:700;font-size:15px;margin-bottom:12px;color:var(--white)}
.popup-btn{width:100%;padding:8px 10px;border-radius:8px;text-align:left;font-size:13px;margin-bottom:6px;background:#1a1d30;border:1px solid rgba(255,255,255,0.06);color:var(--white);cursor:pointer;display:flex;align-items:center;gap:8px}
.popup-btn:hover{background:#22253a}
.popup-btn:last-child{margin-bottom:0}
.popup-btn.danger{color:#ff6b6b}
.popup-btn.danger:hover{background:rgba(255,107,107,0.08)}
.popup-btn:disabled{opacity:0.4;cursor:default}

/* FRIEND REQUEST TOAST */
#frToast{display:none;position:fixed;bottom:24px;right:24px;background:#13152a;border:1px solid rgba(108,124,255,0.3);border-radius:12px;padding:16px 20px;z-index:600;box-shadow:0 8px 32px rgba(0,0,0,0.5);min-width:260px}
.fr-title{font-size:14px;font-weight:600;margin-bottom:4px}
.fr-sub{font-size:13px;color:var(--muted);margin-bottom:12px}
.fr-btns{display:flex;gap:8px}
.fr-accept{flex:1;padding:7px;border-radius:7px;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:13px;font-weight:600}
.fr-decline{flex:1;padding:7px;border-radius:7px;background:#1a1d30;color:var(--muted);border:1px solid rgba(255,255,255,0.06);cursor:pointer;font-size:13px}

/* EMOJI PICKER */
#emoji-picker-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1200;align-items:center;justify-content:center}
#emoji-picker{width:min(640px,92vw);height:min(480px,70vh);border-radius:16px;background:linear-gradient(180deg,#fff,#f4f6ff);position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.5);display:flex;flex-direction:column;align-items:center;padding:18px}
#emoji-grid{flex:1;width:100%;display:grid;grid-template-columns:repeat(auto-fill,44px);gap:8px;align-content:start;overflow:auto;padding:12px;border-radius:12px}
#emoji-close{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:62px;height:62px;border-radius:50%;background:#ff4d4f;color:#fff;border:none;font-size:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(0,0,0,0.2);cursor:pointer}

/* MOBILE */
#mobileRoomsBtn{display:none;position:relative;z-index:101;flex-shrink:0;margin-right:4px}
#mobileSidebar{position:fixed;top:64px;left:0;width:220px;max-width:72vw;height:calc(100% - 64px);background:#0d0f1a;border-right:1px solid rgba(255,255,255,0.02);z-index:999;box-shadow:4px 0 16px rgba(0,0,0,0.4);transform:translateX(-100%);transition:transform 0.25s ease;display:flex;flex-direction:column}
#mobileSidebar.show{transform:translateX(0)}
#mobileSidebarOverlay{display:none;position:fixed;inset:0;top:64px;z-index:998;background:rgba(0,0,0,0.35)}
#mobileSidebarOverlay.show{display:block}
@media(max-width:900px){
  #mobileRoomsBtn{display:flex}
  .sidebar{display:none}
  .usersPanel{display:none}
  .roomHeader .meta{display:none}
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="authScreen">
  <div class="auth-box">
    <h2>Vyntra</h2>
    <p>Chat with your friends</p>
    <div id="stepTabs">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Login</button>
        <button class="auth-tab"        onclick="switchTab('register')">Register</button>
      </div>
      <div id="formLogin">
        <div class="auth-field"><label>Username</label><input id="loginUsername" type="text" placeholder="your username" autocomplete="username" /></div>
        <div class="auth-field"><label>Password</label><input id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password" /></div>
        <button class="auth-submit" id="loginBtn" onclick="doLogin()">Login</button>
      </div>
      <div id="formReg" style="display:none">
        <div class="auth-field"><label>Username</label><input id="regUsername" type="text" placeholder="coolname" autocomplete="username" /></div>
        <div class="auth-field"><label>Email</label><input id="regEmail" type="email" placeholder="you@example.com" autocomplete="email" /></div>
        <div class="auth-field"><label>Password</label><input id="regPass" type="password" placeholder="••••••••" autocomplete="new-password" /></div>
        <button class="auth-submit" id="registerBtn" onclick="doRegister()">Create account</button>
      </div>
    </div>
    <div id="step2FA" style="display:none">
      <p style="color:var(--muted);font-size:14px;margin:0 0 20px">We sent a 6-digit code to your email:</p>
      <div class="code-inputs">
        <input class="code-digit" maxlength="1" inputmode="numeric" />
        <input class="code-digit" maxlength="1" inputmode="numeric" />
        <input class="code-digit" maxlength="1" inputmode="numeric" />
        <input class="code-digit" maxlength="1" inputmode="numeric" />
        <input class="code-digit" maxlength="1" inputmode="numeric" />
        <input class="code-digit" maxlength="1" inputmode="numeric" />
      </div>
      <button class="auth-submit" id="verifyBtn" onclick="doVerify()">Verify</button>
      <button class="back-btn" onclick="cancelVerify()">← Back to login</button>
    </div>
    <div class="auth-error" id="authError"></div>
  </div>
</div>

<!-- APP -->
<div id="appShell">
  <header>
    <div class="header-left">
      <button id="mobileRoomsBtn" class="icon-btn" title="Menu">☰</button>
      <h1>Vyntra</h1>
      <span id="headerUsername" style="color:var(--muted);font-size:13px"></span>
    </div>
    <div style="display:flex;gap:8px">
      <button class="ghost small" id="reconnectBtn">Reconnect</button>
      <button class="ghost small" onclick="doLogout()">Logout</button>
    </div>
  </header>

  <div id="mobileSidebarOverlay"></div>
  <div id="mobileSidebar">
    <div class="sidebar-tabs">
      <button class="sidebar-tab active" onclick="mobileSwitchTab('rooms',this)">Rooms</button>
      <button class="sidebar-tab"        onclick="mobileSwitchTab('friends',this)">Friends</button>
    </div>
    <div id="mobileRoomsList"   class="sidebar-panel active"></div>
    <div id="mobileFriendsList" class="sidebar-panel"></div>
  </div>

  <main>
    <div class="sidebar">
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" onclick="switchSidebarTab('rooms',this)">Rooms</button>
        <button class="sidebar-tab"        onclick="switchSidebarTab('friends',this)">Friends</button>
      </div>
      <div id="roomsList"   class="sidebar-panel active"></div>
      <div id="friendsList" class="sidebar-panel"></div>
    </div>

    <section class="chatArea">
      <div class="roomHeader">
        <div>
          <div id="roomTitle" style="font-weight:600">Select a room</div>
          <div class="meta" id="roomMeta">Join a room to start chatting</div>
        </div>
        <div id="roomUsersCount" class="meta">0 users</div>
      </div>
      <div class="messages" id="messages">
        <div class="center-note">Join a room to see messages</div>
      </div>
      <div class="compose">
        <button id="openPickerBtn" class="icon-btn" title="Emoji">✦</button>
        <input id="msgInput" class="msg-input" type="text" placeholder="Type a message…" />
        <button id="sendBtn" class="small">Send</button>
      </div>
    </section>

    <aside class="usersPanel">
      <h4>In room</h4>
      <div id="usersList"></div>
    </aside>
  </main>
</div>

<!-- USER POPUP -->
<div id="popupOverlay"></div>
<div id="userPopup">
  <div class="popup-username" id="popupName"></div>
  <button class="popup-btn" id="popupDM">💬 Message</button>
  <button class="popup-btn" id="popupFriend">👤 Add Friend</button>
  <button class="popup-btn danger" id="popupMute">🔇 Mute</button>
  <button class="popup-btn" onclick="closeUserPopup()">✕ Close</button>
</div>

<!-- FRIEND REQUEST TOAST -->
<div id="frToast">
  <div class="fr-title">Friend Request 👋</div>
  <div class="fr-sub" id="frSubText"></div>
  <div class="fr-btns">
    <button class="fr-accept"  id="frAcceptBtn">Accept</button>
    <button class="fr-decline" id="frDeclineBtn">Decline</button>
  </div>
</div>

<!-- EMOJI PICKER -->
<div id="emoji-picker-overlay">
  <div id="emoji-picker">
    <input id="emoji-search" placeholder="Search emoji..." autocomplete="off" />
    <div id="emoji-grid"></div>
    <button id="emoji-close">✕</button>
  </div>
</div>

<script>
/* ── STATE (all var — no TDZ issues) ── */
var ws = null, connected = false, currentRoom = null, myName = "";
var myFriends = [], mutedUsers = [], messagesCache = {}, allRooms = new Set();
var _listenersReady = false, pendingFRFrom = null, pendingUsername = null;
var allEmojis = [], pickerOpenFor = null;

/* ══════════════════════════════════
   AUTH
══════════════════════════════════ */
function switchTab(tab){
  document.getElementById('formLogin').style.display = tab==='login'    ? '' : 'none';
  document.getElementById('formReg').style.display   = tab==='register' ? '' : 'none';
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',i===(tab==='login'?0:1)));
  setAuthError('');
}
function setAuthError(m){ document.getElementById('authError').textContent=m; }
function setBusy(id,busy){
  var btn=document.getElementById(id);
  btn.disabled=busy;
  btn.textContent=busy?'…':{loginBtn:'Login',registerBtn:'Create account',verifyBtn:'Verify'}[id];
}

async function doLogin(){
  var u=document.getElementById('loginUsername').value.trim();
  var p=document.getElementById('loginPass').value;
  if(!u||!p) return setAuthError('Please fill in all fields');
  setBusy('loginBtn',true);
  try{
    var r=await fetch('/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    var d=await r.json();
    if(!r.ok){setAuthError(d.error||'Login failed');return;}
    pendingUsername=d.username;
    document.getElementById('stepTabs').style.display='none';
    document.getElementById('step2FA').style.display='';
    setAuthError('');
    setTimeout(()=>document.querySelector('.code-digit').focus(),80);
  }catch(e){setAuthError('Network error');}
  finally{setBusy('loginBtn',false);}
}

async function doRegister(){
  var u=document.getElementById('regUsername').value.trim();
  var e=document.getElementById('regEmail').value.trim();
  var p=document.getElementById('regPass').value;
  if(!u||!e||!p) return setAuthError('Please fill in all fields');
  setBusy('registerBtn',true);
  try{
    var r=await fetch('/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,email:e,password:p})});
    var d=await r.json();
    if(!r.ok){setAuthError(d.error||'Registration failed');return;}
    saveSession(d.token,d.username);
    launchApp(d.token,d.username,[]);
  }catch(e){setAuthError('Network error');}
  finally{setBusy('registerBtn',false);}
}

async function doVerify(){
  var code=Array.from(document.querySelectorAll('.code-digit')).map(i=>i.value).join('');
  if(code.length<6) return setAuthError('Enter all 6 digits');
  setBusy('verifyBtn',true);
  try{
    var r=await fetch('/auth/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:pendingUsername,code:code})});
    var d=await r.json();
    if(!r.ok){setAuthError(d.error||'Verification failed');return;}
    saveSession(d.token,d.username);
    launchApp(d.token,d.username,[]);
  }catch(e){setAuthError('Network error');}
  finally{setBusy('verifyBtn',false);}
}

function cancelVerify(){
  pendingUsername=null;
  document.getElementById('step2FA').style.display='none';
  document.getElementById('stepTabs').style.display='';
  document.querySelectorAll('.code-digit').forEach(i=>i.value='');
  setAuthError('');
}

function saveSession(token,username){
  localStorage.setItem('vyntra_token',token);
  localStorage.setItem('vyntra_username',username);
}
function doLogout(){
  localStorage.removeItem('vyntra_token');
  localStorage.removeItem('vyntra_username');
  location.reload();
}

// Auto-login
(function(){
  var token=localStorage.getItem('vyntra_token');
  var username=localStorage.getItem('vyntra_username');
  if(token&&username) launchApp(token,username,[]);
})();

// 2FA digit UX
document.addEventListener('DOMContentLoaded',function(){
  var digits=document.querySelectorAll('.code-digit');
  digits.forEach(function(input,idx){
    input.addEventListener('input',function(){
      input.value=input.value.replace(/\D/g,'').slice(-1);
      if(input.value&&idx<digits.length-1) digits[idx+1].focus();
      if(idx===digits.length-1&&input.value) doVerify();
    });
    input.addEventListener('keydown',function(e){
      if(e.key==='Backspace'&&!input.value&&idx>0) digits[idx-1].focus();
    });
    input.addEventListener('paste',function(e){
      var pasted=(e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'').slice(0,6);
      if(pasted.length===6){digits.forEach(function(d,i){d.value=pasted[i]||'';});digits[5].focus();setTimeout(doVerify,100);}
      e.preventDefault();
    });
  });
});

/* ══════════════════════════════════
   LAUNCH
══════════════════════════════════ */
function launchApp(token,username,friends){
  myName=username;
  myFriends=friends||[];
  mutedUsers=JSON.parse(localStorage.getItem('vyntra_muted')||'[]');
  document.getElementById('authScreen').style.display='none';
  document.getElementById('appShell').style.display='flex';
  document.getElementById('headerUsername').textContent='@'+username;
  connectWS(token);
  initAppListeners();
}

/* ══════════════════════════════════
   WEBSOCKET
══════════════════════════════════ */
function safeParse(s){try{return JSON.parse(s);}catch(e){return null;}}

function connectWS(token){
  if(!location.host) return;
  if(ws){try{ws.close();}catch(e){}}
  var protocol=location.protocol==='https:'?'wss://':'ws://';
  try{ws=new WebSocket(protocol+location.host);}catch(e){return;}
  ws.addEventListener('open',function(){connected=true;ws.send(JSON.stringify({type:'auth',token:token}));});
  ws.addEventListener('close',function(){connected=false;setTimeout(function(){var t=localStorage.getItem('vyntra_token');if(t)connectWS(t);},2000);});
  ws.addEventListener('message',function(ev){handleWsMsg(ev.data);});
  ws.addEventListener('error',function(){connected=false;});
}
function wsSend(obj){if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify(obj));}

/* ══════════════════════════════════
   WS HANDLER
══════════════════════════════════ */
function handleWsMsg(raw){
  var data=safeParse(raw);
  if(!data) return;
  if     (data.type==='rooms')            populateRooms(data.rooms||[]);
  else if(data.type==='users'&&data.room===currentRoom) populateUsers(data.users||[]);
  else if(data.type==='system')           pushSystemMessage(data.text);
  else if(data.type==='chat')             cacheAndRenderMessage(data);
  else if(data.type==='auth_ok')          {myFriends=data.friends||[];renderFriendsList();}
  else if(data.type==='auth_err')         doLogout();
  else if(data.type==='friends_update')   {myFriends=data.friends||[];renderFriendsList();}
  else if(data.type==='friend_request')   showFriendRequest(data.from);
  else if(data.type==='friend_accepted')  showToastMsg('🎉 '+data.by+' accepted your friend request!');
  else if(data.type==='friend_declined')  showToastMsg('❌ '+data.by+' declined your request.');
  else if(data.type==='unfriended')       {myFriends=myFriends.filter(function(f){return f!==data.by;});renderFriendsList();}
  else if(data.type==='friend_request_sent') showToastMsg('📨 Friend request sent to '+data.to+'!');
}

/* ══════════════════════════════════
   LISTENERS
══════════════════════════════════ */
function initAppListeners(){
  if(_listenersReady) return;
  _listenersReady=true;
  document.getElementById('sendBtn').addEventListener('click',sendMessage);
  document.getElementById('msgInput').addEventListener('keypress',function(e){if(e.key==='Enter')sendMessage();});
  document.getElementById('reconnectBtn').addEventListener('click',function(){var t=localStorage.getItem('vyntra_token');if(t)connectWS(t);});
  document.getElementById('openPickerBtn').addEventListener('click',function(){openEmojiPicker('__composer');});
  document.getElementById('mobileRoomsBtn').addEventListener('click',function(){
    document.getElementById('mobileSidebar').classList.contains('show')?closeMobileSidebar():openMobileSidebar();
  });
  document.getElementById('mobileSidebarOverlay').addEventListener('click',closeMobileSidebar);
  document.getElementById('emoji-close').addEventListener('click',closeEmojiPicker);
  document.getElementById('emoji-search').addEventListener('input',function(e){populateEmojiGrid(e.target.value.trim());});
  document.getElementById('emoji-picker-overlay').addEventListener('click',function(ev){if(ev.target===document.getElementById('emoji-picker-overlay'))closeEmojiPicker();});
  document.getElementById('popupOverlay').addEventListener('click',closeUserPopup);
}

/* ══════════════════════════════════
   SIDEBAR TABS
══════════════════════════════════ */
function switchSidebarTab(tab,btn){
  document.querySelectorAll('.sidebar > .sidebar-tabs .sidebar-tab').forEach(function(t){t.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById('roomsList').classList.toggle('active',tab==='rooms');
  document.getElementById('friendsList').classList.toggle('active',tab==='friends');
}
function mobileSwitchTab(tab,btn){
  document.querySelectorAll('#mobileSidebar .sidebar-tab').forEach(function(t){t.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById('mobileRoomsList').classList.toggle('active',tab==='rooms');
  document.getElementById('mobileFriendsList').classList.toggle('active',tab==='friends');
}

/* ══════════════════════════════════
   ROOMS
══════════════════════════════════ */
function populateRooms(list){
  var containers=[document.getElementById('roomsList'),document.getElementById('mobileRoomsList')];
  containers.forEach(function(c){c.innerHTML='';});
  list.forEach(function(r){
    allRooms.add(r);
    containers.forEach(function(container){
      var btn=document.createElement('div');
      btn.className='room'; btn.dataset.room=r;
      btn.innerHTML='<div class="r-icon">'+r.slice(0,2).toUpperCase()+'</div><h4>'+r+'</h4>';
      btn.addEventListener('click',function(){joinRoom(r);closeMobileSidebar();});
      container.appendChild(btn);
    });
  });
}

function joinRoom(room){
  if(!connected) return alert('Not connected');
  currentRoom=room;
  document.getElementById('messages').innerHTML='';
  var title=room.startsWith('dm_')?'💬 DM: '+room.replace('dm_','').replace(/_/g,' & '):room;
  document.getElementById('roomTitle').textContent=title;
  document.getElementById('roomMeta').textContent='Loading messages…';
  document.getElementById('roomUsersCount').textContent='0 users';
  document.querySelectorAll('.room').forEach(function(r){r.classList.toggle('active',r.dataset.room===room);});
  wsSend({type:'join',room:room});
}

/* ══════════════════════════════════
   FRIENDS
══════════════════════════════════ */
function renderFriendsList(){
  var containers=[document.getElementById('friendsList'),document.getElementById('mobileFriendsList')];
  containers.forEach(function(container){
    container.innerHTML='';
    if(!myFriends.length){
      container.innerHTML='<div class="no-friends">No friends yet.<br>Click a username in chat to add one!</div>';
      return;
    }
    myFriends.forEach(function(f){
      var item=document.createElement('div');
      item.className='friend-item';
      item.innerHTML=
        '<div class="friend-avatar">'+f.slice(0,1).toUpperCase()+'</div>'+
        '<div class="friend-name">'+f+'</div>'+
        '<div class="friend-actions">'+
          '<button class="friend-btn dm-btn" title="DM">💬</button>'+
          '<button class="friend-btn danger unfriend-btn" title="Unfriend">✕</button>'+
        '</div>';
      item.querySelector('.dm-btn').addEventListener('click',function(){openDM(f);closeMobileSidebar();});
      item.querySelector('.unfriend-btn').addEventListener('click',function(){if(confirm('Unfriend '+f+'?'))wsSend({type:'unfriend',username:f});});
      container.appendChild(item);
    });
  });
}

function openDM(username){
  var room='dm_'+[myName,username].sort().join('_');
  joinRoom(room);
}

/* ══════════════════════════════════
   USER POPUP
══════════════════════════════════ */
function openUserPopup(username,event){
  if(username===myName) return;
  var isFriend=myFriends.indexOf(username)>=0;
  var isMuted=mutedUsers.indexOf(username)>=0;
  document.getElementById('popupName').textContent=username;
  var friendBtn=document.getElementById('popupFriend');
  friendBtn.textContent=isFriend?'👤 Already friends':'👤 Add Friend';
  friendBtn.disabled=isFriend;
  document.getElementById('popupMute').textContent=isMuted?'🔊 Unmute':'🔇 Mute';
  document.getElementById('popupDM').onclick=function(){openDM(username);closeUserPopup();};
  document.getElementById('popupFriend').onclick=function(){if(!isFriend){wsSend({type:'friend_request',to:username});closeUserPopup();}};
  document.getElementById('popupMute').onclick=function(){toggleMute(username);closeUserPopup();};
  var x=Math.min(event.clientX,window.innerWidth-210);
  var y=Math.min(event.clientY,window.innerHeight-230);
  var popup=document.getElementById('userPopup');
  popup.style.left=x+'px'; popup.style.top=y+'px';
  popup.style.display='block';
  document.getElementById('popupOverlay').style.display='block';
}
function closeUserPopup(){
  document.getElementById('userPopup').style.display='none';
  document.getElementById('popupOverlay').style.display='none';
}

/* ══════════════════════════════════
   MUTE
══════════════════════════════════ */
function toggleMute(username){
  var idx=mutedUsers.indexOf(username);
  if(idx>=0) mutedUsers.splice(idx,1);
  else mutedUsers.push(username);
  localStorage.setItem('vyntra_muted',JSON.stringify(mutedUsers));
  showToastMsg(idx>=0?'🔊 Unmuted '+username:'🔇 Muted '+username);
}

/* ══════════════════════════════════
   FRIEND REQUEST TOAST
══════════════════════════════════ */
function showFriendRequest(from){
  pendingFRFrom=from;
  document.getElementById('frSubText').textContent=from+' wants to be your friend!';
  document.getElementById('frToast').style.display='block';
  document.getElementById('frAcceptBtn').onclick=function(){wsSend({type:'friend_accept',from:from});hideFRToast();};
  document.getElementById('frDeclineBtn').onclick=function(){wsSend({type:'friend_decline',from:from});hideFRToast();};
}
function hideFRToast(){document.getElementById('frToast').style.display='none';pendingFRFrom=null;}

function showToastMsg(msg){
  var t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#13152a;border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px 20px;font-size:14px;z-index:700;box-shadow:0 4px 20px rgba(0,0,0,0.4);white-space:nowrap';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){t.remove();},3500);
}

/* ══════════════════════════════════
   CHAT
══════════════════════════════════ */
function sendMessage(){
  if(!connected) return alert('Not connected');
  if(!currentRoom) return alert('Join a room first');
  var input=document.getElementById('msgInput');
  var text=input.value.trim();
  if(!text) return;
  wsSend({type:'message',text:text});
  input.value='';
}
function reactMessage(messageId,emoji){
  if(!connected||!currentRoom) return;
  wsSend({type:'reaction',messageId:messageId,emoji:emoji});
}

/* ══════════════════════════════════
   USERS IN ROOM
══════════════════════════════════ */
function populateUsers(list){
  var cont=document.getElementById('usersList');
  cont.innerHTML='';
  (list||[]).forEach(function(u){
    var div=document.createElement('div');
    div.className='user-item';
    div.innerHTML='<div class="pulse"></div><div>'+u+'</div>';
    div.addEventListener('click',function(e){openUserPopup(u,e);});
    cont.appendChild(div);
  });
  document.getElementById('roomUsersCount').textContent=list.length+' user'+(list.length!==1?'s':'');
}

/* ══════════════════════════════════
   MESSAGES
══════════════════════════════════ */
function cacheAndRenderMessage(msg){
  if(!msg||!msg.room) return;
  if(!messagesCache[msg.room]) messagesCache[msg.room]=[];
  var idx=messagesCache[msg.room].findIndex(function(m){return m.id===msg.id;});
  if(idx>=0) messagesCache[msg.room][idx]=msg;
  else messagesCache[msg.room].push(msg);
  if(msg.room===currentRoom) renderMessage(msg);
}

function pushSystemMessage(text){
  var el=document.createElement('div');
  el.className='system'; el.textContent=text;
  var msgs=document.getElementById('messages');
  msgs.appendChild(el); msgs.scrollTop=msgs.scrollHeight;
}

function renderMessage(msg){
  if(mutedUsers.indexOf(msg.user)>=0) return;
  var container=document.getElementById('messages');
  var existing=document.getElementById('msg-'+msg.id);
  if(existing){populateReactions(existing.querySelector('.reactions'),msg);return;}
  var placeholder=container.querySelector('.center-note');
  if(placeholder) placeholder.remove();

  var wrapper=document.createElement('div');
  wrapper.className='msg'+(msg.user===myName?' me':'');
  wrapper.id='msg-'+msg.id;

  var meta=document.createElement('div'); meta.className='meta';
  var nameSpan=document.createElement('span'); nameSpan.className='username-link'; nameSpan.textContent=msg.user;
  nameSpan.addEventListener('click',function(e){openUserPopup(msg.user,e);});
  var timeSpan=document.createElement('span'); timeSpan.style.opacity='0.65';
  timeSpan.textContent=' • '+new Date(parseInt(String(msg.id).split('_')[0])).toLocaleTimeString();
  meta.appendChild(nameSpan); meta.appendChild(timeSpan);

  var text=document.createElement('div'); text.className='text'; text.textContent=msg.text;
  var reactionsDiv=document.createElement('div'); reactionsDiv.className='reactions';
  populateReactions(reactionsDiv,msg);

  wrapper.appendChild(meta); wrapper.appendChild(text); wrapper.appendChild(reactionsDiv);
  container.appendChild(wrapper); container.scrollTop=container.scrollHeight;
}

function populateReactions(reactionsDiv,msg){
  var voted=msg.reactions?Object.keys(msg.reactions).filter(function(k){return msg.reactions[k].length>0;}) :[];
  reactionsDiv.innerHTML='';
  voted.forEach(function(e){
    var btn=document.createElement('button');
    btn.className='reaction'+(msg.reactions[e].indexOf(myName)>=0?' you':'');
    btn.innerHTML='<span style="font-size:16px">'+e+'</span><span style="margin-left:4px">'+msg.reactions[e].length+'</span>';
    btn.onclick=function(){reactMessage(msg.id,e);};
    reactionsDiv.appendChild(btn);
  });
  var picker=document.createElement('button');
  picker.className='reaction'; picker.textContent='✦'; picker.title='Add reaction';
  picker.style.background='transparent';
  picker.onclick=function(){openEmojiPicker(msg.id);};
  reactionsDiv.appendChild(picker);
}

   MOBILE SIDEBAR
══════════════════════════════════ */
function openMobileSidebar(){
  document.getElementById('mobileSidebar').classList.add('show');
  document.getElementById('mobileSidebarOverlay').classList.add('show');
}
function closeMobileSidebar(){
  document.getElementById('mobileSidebar').classList.remove('show');
  document.getElementById('mobileSidebarOverlay').classList.remove('show');
}

/* ══════════════════════════════════
   EMOJI PICKER
══════════════════════════════════ */
(async function loadEmojiSet(){
  try{
    var res=await fetch('https://unpkg.com/emoji.json@13.1.0/emoji.json');
    var json=await res.json();
    allEmojis=json.filter(function(e){return e.char&&e.name;}).map(function(e){return{char:e.char,name:e.name};});
  }catch(e){allEmojis=[{char:'😀',name:'grinning face'},{char:'😂',name:'tears of joy'},{char:'❤️',name:'red heart'}];}
})();

function openEmojiPicker(msgId){
  pickerOpenFor=msgId;
  document.getElementById('emoji-picker-overlay').style.display='flex';
  populateEmojiGrid('');
  setTimeout(function(){document.getElementById('emoji-search').focus();},80);
}
function closeEmojiPicker(){
  pickerOpenFor=null;
  document.getElementById('emoji-picker-overlay').style.display='none';
  document.getElementById('emoji-search').value='';
}
function populateEmojiGrid(filter){
  var grid=document.getElementById('emoji-grid'); grid.innerHTML='';
  var f=(filter||'').toLowerCase(), count=0;
  for(var i=0;i<allEmojis.length;i++){
    var e=allEmojis[i];
    if(f&&!e.char.includes(f)&&!e.name.toLowerCase().includes(f)) continue;
    var btn=document.createElement('button'); btn.textContent=e.char;
    (function(ch){btn.onclick=function(){
      if(pickerOpenFor==='__composer'){document.getElementById('msgInput').value+=ch;return;}
      reactMessage(pickerOpenFor,ch);closeEmojiPicker();
    };})(e.char);
    grid.appendChild(btn);
    if(++count>3000) break;
  }
}
</script>
