<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Vyntra — Chat</title>

<style>
:root{
  --bg:#0f1220;
  --panel:#161827;
  --muted:#9aa0b4;
  --accent:#6c7cff;
  --bubble:#20233a;
  --system:#8b8f9f;
  --white:#eef2ff;
}

*{box-sizing:border-box}

html,body{
  height:100%;
  margin:0;
  font-family:Inter,Segoe UI,system-ui,Arial;
  background:var(--bg);
  color:var(--white);
  -webkit-font-smoothing:antialiased
}

header{
  height:64px;
  background:linear-gradient(90deg,#11121b,#15172b);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  border-bottom:1px solid rgba(255,255,255,0.03);
  position:relative;
}

.header-left{display:flex;gap:12px;align-items:center}

h1{
  font-size:16px;
  margin:0;
  font-weight:600;
}

.controls{display:flex;gap:8px;align-items:center}

input,select,button{font-size:14px}

input[type="text"],select{
  background:#0b0d16;
  border:1px solid rgba(255,255,255,0.04);
  color:var(--white);
  padding:8px;
  border-radius:6px
}

button{
  background:var(--accent);
  color:white;
  border:0;
  padding:8px 10px;
  border-radius:8px;
  cursor:pointer
}

button.ghost{
  background:transparent;
  border:1px solid rgba(255,255,255,0.04)
}

main{
  display:flex;
  flex:1;
  overflow:hidden;
  height:calc(100% - 64px)
}

.sideRooms{
  width:220px;
  background:#0d0f1a;
  border-right:1px solid rgba(255,255,255,0.02);
  padding:12px;
  overflow:auto
}

.room{
  padding:8px 10px;
  border-radius:8px;
  margin-bottom:6px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:8px
}

.room.active{
  background:linear-gradient(90deg,#1b1d33,#151629);
}

.room .emoji{
  width:30px;
  height:30px;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0f111a
}

.room h4{margin:0;font-size:13px}

.chatArea{
  flex:1;
  display:flex;
  flex-direction:column;
  min-width:0
}

.roomHeader{
  padding:12px;
  border-bottom:1px solid rgba(255,255,255,0.03);
  display:flex;
  justify-content:space-between;
  align-items:center
}

.messages{
  flex:1;
  overflow:auto;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:10px
}

.msg{
  max-width:80%;
  padding:10px 12px;
  border-radius:10px;
  background:var(--bubble);
  word-break:break-word
}

.msg.me{
  background:linear-gradient(90deg,#5f6bff,#7d86ff);
  align-self:flex-end
}

.compose{
  display:flex;
  padding:12px;
  border-top:1px solid rgba(255,255,255,0.03);
  gap:8px
}

input.msg-input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.03);
  background:#0b0d16;
  color:var(--white)
}

.usersPanel{
  width:220px;
  border-left:1px solid rgba(255,255,255,0.02);
  background:#0b0e18;
  padding:12px;
  overflow:auto
}

/* MOBILE ROOMS PANEL */

#mobileRoomsPanel{
  position:fixed;
  top:64px;
  left:0;
  width:220px;
  height:calc(100% - 64px);
  background:#0d0f1a;
  transform:translateX(-100%);
  transition:transform .25s ease;
  z-index:1000;
}

#mobileRoomsPanel.show{
  transform:translateX(0)
}

#mobileRoomsBtn{
  display:none;
  position:absolute;
  left:8px;
  top:12px;
}

/* MOBILE MODE (portrait phones only) */

@media (max-width:900px) and (orientation:portrait){

  .sideRooms{display:none}
  .usersPanel{display:none}

  #mobileRoomsBtn{
    display:flex
  }

}
</style>
</head>

<body>

<header>

<button id="mobileRoomsBtn">☰</button>

<div class="header-left">
<h1>Vyntra</h1>

<div class="controls">
<input id="name" type="text" placeholder="username" style="width:150px">
<button id="setNameBtn">Set</button>
</div>
</div>

<div class="controls">
<div style="color:var(--muted);font-size:13px;margin-right:8px">Predefined rooms</div>
<button class="ghost" id="reconnectBtn">Reconnect</button>
</div>

</header>

<main>

<div id="mobileRoomsPanel"></div>

<aside class="sideRooms" id="roomsList"></aside>

<section class="chatArea">

<div class="roomHeader">
<div>
<div id="roomTitle">Select a room</div>
<div id="roomMeta">Join a room to start chatting</div>
</div>
<div id="roomUsersCount">0 users</div>
</div>

<div class="messages" id="messages">
<div>Join a room to see messages</div>
</div>

<div class="compose">
<input id="msgInput" class="msg-input" type="text" placeholder="Type message">
<button id="sendBtn">Send</button>
</div>

</section>

<aside class="usersPanel">
<h4>Users</h4>
<div id="usersList"></div>
</aside>

</main>

<script>

let ws
let connected=false
let currentRoom=null
let myName=""

const rooms=new Set()

const mobileRoomsBtn=document.getElementById("mobileRoomsBtn")
const mobileRoomsPanel=document.getElementById("mobileRoomsPanel")

function isPortraitMobile(){
  return window.innerWidth<=900 &&
  window.matchMedia("(orientation: portrait)").matches
}

function connect(){

  if(ws) ws.close()

  const protocol=location.protocol==="https:"?"wss://":"ws://"

  ws=new WebSocket(protocol+location.host)

  ws.addEventListener("open",()=>{
    connected=true
  })

  ws.addEventListener("message",e=>{
    const data=JSON.parse(e.data)

    if(data.type==="rooms"){
      populateRooms(data.rooms)
    }

  })

}

connect()

mobileRoomsBtn.onclick=()=>{

  if(!isPortraitMobile()) return

  mobileRoomsPanel.classList.toggle("show")

}

window.addEventListener("resize",()=>{

  if(!isPortraitMobile()){
    mobileRoomsPanel.classList.remove("show")
  }

})

function populateRooms(list){

  const desktop=document.getElementById("roomsList")
  const mobile=document.getElementById("mobileRoomsPanel")

  desktop.innerHTML=""
  mobile.innerHTML=""

  list.forEach(r=>{

    rooms.add(r)

    const make=()=>{

      const btn=document.createElement("div")
      btn.className="room"

      btn.innerHTML=`<div class="emoji">${r.slice(0,2)}</div><h4>${r}</h4>`

      btn.onclick=()=>{

        joinRoom(r)

        if(isPortraitMobile()){
          mobileRoomsPanel.classList.remove("show")
        }

      }

      return btn

    }

    desktop.appendChild(make())
    mobile.appendChild(make())

  })

}

function joinRoom(room){

  if(!connected) return

  currentRoom=room

  document.getElementById("messages").innerHTML=""

  document.getElementById("roomTitle").textContent=room

  ws.send(JSON.stringify({
    type:"join",
    room:room
  }))

}

document.getElementById("sendBtn").onclick=sendMessage

function sendMessage(){

  if(!connected || !currentRoom) return

  const input=document.getElementById("msgInput")

  const text=input.value.trim()

  if(!text) return

  ws.send(JSON.stringify({
    type:"message",
    text:text
  }))

  input.value=""

}

</script>

</body>
</html>
